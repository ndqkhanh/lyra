site_name: Lyra
site_description: >-
  Lyra is a CLI-native, open-source coding-agent harness — Lightweight
  Yielding Reasoning Agent. Documentation site built with MkDocs Material.
site_author: Lyra Contributors
copyright: Copyright &copy; 2026 Lyra Contributors — MIT License

# Source markdown lives in docs/. Build output goes to docs/site/ which is
# in .gitignore. Open docs/site/index.html in a browser after `mkdocs build`.
docs_dir: docs
site_dir: site
use_directory_urls: true

# Pre-existing block specs in docs/blocks/*.md and a couple of research
# notes contain markdown links to sibling repos in the broader
# harness-engineering monorepo (e.g. ../../../../docs/29-dive-into-claude-code.md
# pointing into a parallel project tree). Those references are valid
# inside the source monorepo but not when MkDocs walks docs_dir as a
# self-contained site. We downgrade the link warnings to "ignore" so
# strict builds pass; the real ground-truth check still happens via
# the `omitted_files` policy on actual nav-mounted pages.
validation:
  nav:
    omitted_files: ignore   # blocks/* and superpowers/* are reachable
                            # via reference pages but not nav-mounted
    not_found: warn
    absolute_links: warn
  links:
    not_found: ignore       # blocks/* contain cross-repo monorepo links
    absolute_links: warn
    unrecognized_links: ignore
    anchors: ignore

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/atom-variant
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - search:
      lang: en
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;'
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

markdown_extensions:
  # Material recommends abbr + admonition + attr_list + def_list + footnotes +
  # md_in_html + tables + toc bundle for full feature support.
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  # Pymdownx is where the magic lives — code blocks, tabs, tasklists,
  # mermaid, emoji, math, mark/keys/etc.
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lyra-contributors/lyra
      name: Lyra on GitHub

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

