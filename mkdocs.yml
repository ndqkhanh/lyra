  - Welcome: index.md
  - Catalogue:
      - Features: features.md
      - Use cases: use-cases.md
  - Get Started:
      - Overview: start/index.md
      - Install: start/install.md
      - First session: start/first-session.md
      - The four modes: start/four-modes.md
      - Slash commands tour: start/slash-commands.md
  - Core Concepts:
      - Overview: concepts/index.md
      - The agent loop: concepts/agent-loop.md
