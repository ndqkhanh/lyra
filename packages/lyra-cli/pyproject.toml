[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lyra-cli"
version = "3.5.0"
description = "Lyra CLI (Typer) — general-purpose Claude-Code-class agent runtime."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "lyra-core",
    "lyra-mcp",
    "typer>=0.12",
    "rich>=13",
    "prompt_toolkit>=3.0",
    "harness-tui",
    "alive-progress>=3.0",
    "structlog>=24.0",
    "tenacity>=8.0",
]

[project.scripts]
lyra = "lyra_cli.__main__:app"
ly = "lyra_cli.__main__:app"

[project.optional-dependencies]
dev = ["pytest>=7.0"]
bedrock = ["boto3>=1.34"]
vertex = ["google-cloud-aiplatform>=1.42"]
copilot = []
oauth = []

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.package-data]
"lyra_cli" = ["templates/*.tmpl"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -ra"
testpaths = ["tests"]
markers = [
    "unit: pure unit tests with no I/O or network",
    "integration: tests that require external services",
    "e2e: end-to-end tests that exercise the full stack",
]
