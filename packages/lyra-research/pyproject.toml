[project]
name = "lyra-research"
version = "0.1.0"
description = "Deep Research Agent for Lyra - Multi-source research discovery and analysis"
authors = ["Lyra Team"]
requires-python = ">=3.11"
dependencies = [
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
    "PyMuPDF>=1.23.0",
    "pdfplumber>=0.10.0",
    "arxiv>=2.1.0",
    "semanticscholar>=0.8.0",
    "networkx>=3.2",
    "spacy>=3.7.0",
    "sentence-transformers>=2.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=lyra_research --cov-report=term-missing"
