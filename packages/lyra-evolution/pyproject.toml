[project]
name = "lyra-evolution"
version = "0.1.0"
description = "Closed-loop self-evolution layer for Lyra — Voyager, Reflexion, stability budgets"
requires-python = ">=3.11"
authors = [
    {name = "Lyra Team"}
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lyra_evolution"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
